<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>🌸 Zoe Guild · Flores - Modo Diagnóstico</title>
<style>
:root{--green:#4a7c59;--green-dark:#2d5a3d;--green-light:#d4e8d0;--green-faint:#f0f9f1;--cream:#fdf6ee;--text:#2d3a2e;--muted:#6b7c71;--border:rgba(74,124,89,.18);--radius:16px;--shadow:0 1px 4px rgba(45,90,61,.08)}*{box-sizing:border-box}body{margin:0;font-family:system-ui,sans-serif;background:var(--cream);color:var(--text)}.header{background:linear-gradient(180deg,var(--green-dark),var(--green));color:#fff;padding:18px 16px}.header h1{margin:0;font-size:20px}.header p{margin:4px 0 0;font-size:12px;opacity:.8}.wrap{padding:14px}.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.btn{border:none;border-radius:999px;padding:10px 14px;font-weight:700;background:var(--green);color:#fff;cursor:pointer}.btn:active{transform:scale(.98)}.btn-soft{background:var(--green-faint);color:var(--green-dark);border:1px solid var(--green-light)}.tab{display:none}.tab.active{display:block}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pill{padding:7px 12px;border-radius:999px;border:1px solid var(--green-light);background:var(--green-faint);cursor:pointer}.pill.active{background:var(--green);color:#fff;border-color:var(--green)}.member{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:#fff;margin-bottom:10px}.member-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;background:#fff}.avatar{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;flex:0 0 auto}.name{flex:1;font-weight:700}.count{font-size:12px;color:var(--muted)}.body{padding:0 14px 14px;border-top:1px solid var(--border)}.hidden{display:none}.footer{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--border);display:flex}.footer button{flex:1;padding:14px;border:none;background:#fff;cursor:pointer}.footer button.active{color:var(--green);font-weight:700}.mini{font-size:12px;color:var(--muted)}.search{width:100%;padding:12px 14px;border-radius:999px;border:2px solid var(--green-light);font-size:16px}.grid{display:grid;gap:10px}.ghost{font-size:13px;color:var(--muted)}.debug{white-space:pre-wrap;background:#111;color:#bdf;padding:12px;border-radius:12px;font-size:12px;overflow:auto}
</style>
</head>
<body>
<div class="header"><h1>🌸 Zoe Guild</h1><p>Modo diagnóstico sem Firebase</p></div>
<div class="wrap">
  <div class="card"><div class="row"><button class="btn-soft btn" onclick="setTab('buscar')">Buscar</button><button class="btn-soft btn" onclick="setTab('galeria')">Galeria</button><button class="btn-soft btn" onclick="setTab('editar')">Editar</button></div></div>
  <div id="buscar" class="tab active">
    <div class="card"><input class="search" id="q" placeholder="Buscar flor..." oninput="renderBuscar()"></div>
    <div id="buscar-res"></div>
  </div>
  <div id="galeria" class="tab">
    <div id="galeria-res"></div>
  </div>
  <div id="editar" class="tab">
    <div class="card ghost">Se os cliques funcionarem aqui, o problema não é do botão — é do carregamento/Firebase do app real.</div>
    <div id="editar-res"></div>
  </div>
</div>
<div class="footer"><button onclick="setTab('buscar')">Buscar</button><button onclick="setTab('galeria')">Galeria</button><button onclick="setTab('editar')">Editar</button></div>
<script>
const catalogo=[{en:'rose',pt:'rosa',emoji:'🌹',rarity:'N'},{en:'lily',pt:'lírio',emoji:'🌷',rarity:'R'},{en:'orchid',pt:'orquídea',emoji:'🌸',rarity:'SR'}];
const membros=['Ava Godin','Bila','Carol'];
const colecoes={'Ava Godin':[catalogo[0],catalogo[1]],'Bila':[catalogo[2]],'Carol':[catalogo[0],catalogo[2]]};
const openG={}, openE={};
function setTab(id){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='galeria') renderGaleria(); if(id==='editar') renderEditar(); if(id==='buscar') renderBuscar();}
function color(name){let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))>>>0; return `hsl(${h%360} 55% 48%)`;}
function setSearch(t){q.value=t; renderBuscar();}
function renderBuscar(){const term=q.value.trim().toLowerCase(); const res=document.getElementById('buscar-res'); if(!term){res.innerHTML=''; return;} const hits=catalogo.filter(f=>(f.en+f.pt).toLowerCase().includes(term)); res.innerHTML='<div class="card"><div class="mini">'+hits.length+' resultado(s)</div><div class="grid">'+hits.map(f=>`<div class="pill" onclick="setSearch('${f.pt}')">${f.emoji} ${f.pt} / ${f.en}</div>`).join('')+'</div></div>';}
function toggleG(m){openG[m]=!openG[m]; renderGaleria();}
function renderGaleria(){const el=document.getElementById('galeria-res'); el.innerHTML=membros.map(m=>{const open=!!openG[m]; const flores=colecoes[m]||[]; return `<div class="member"><div class="member-head" onclick="toggleG('${m}')"><div class="avatar" style="background:${color(m)}">${m[0]}</div><div class="name">${m}</div><div class="count">${flores.length} flores</div><div>⌄</div></div>${open?`<div class="body"><div class="mini">${flores.map(f=>f.emoji+' '+f.pt).join(', ')}</div></div>`:''}</div>`}).join('')}
function toggleE(m){openE[m]=!openE[m]; renderEditar();}
function renderEditar(){const el=document.getElementById('editar-res'); el.innerHTML=membros.map(m=>{const open=!!openE[m]; const flores=colecoes[m]||[]; return `<div class="member"><div class="member-head" onclick="toggleE('${m}')"><div class="avatar" style="background:${color(m)}">${m[0]}</div><div class="name">${m}</div><div class="count">${flores.length} flores</div><div>⌄</div></div>${open?`<div class="body"><input class="search" placeholder="Filtrar flores..." oninput="filterDummy(this.value)"><div class="mini" id="dummy">${flores.map(f=>f.pt).join(', ')}</div></div>`:''}</div>`}).join('')}
function filterDummy(v){document.getElementById('dummy').textContent='Filtro: '+v}
renderBuscar(); renderGaleria(); renderEditar();
</script>
</body>
</html>
